<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marker - Where the rough becomes refined</title>

    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://marker.page/">
    <meta property="og:title" content="Marker - Where the rough becomes refined">
    <meta property="og:description" content="Marker is a writing space built for serious thinking: focused, flexible, and made for ideas to take shape.">
    <meta property="og:image" content="https://marker.page/images/opengraph.png">

    <!-- Twitter Card -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://marker.page/">
    <meta property="twitter:title" content="Marker - Where the rough becomes refined">
    <meta property="twitter:description" content="Marker is a writing space built for serious thinking: focused, flexible, and made for ideas to take shape.">
    <meta property="twitter:image" content="https://marker.page/images/opengraph.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'grosa': ['Grosa Light', 'Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        'ia': ['iA', 'Courier New', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @font-face {
            font-family: 'Grosa';
            src: url('fonts/grosa.woff2') format('woff2'),
                url('fonts/grosa.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Grosa Light';
            src: url('fonts/GrosaTrial-Light.woff2') format('woff2'),
                url('fonts/GrosaTrial-Light.woff') format('woff');
            font-weight: 300;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'iA';
            src: url('fonts/iAWriterQuattroS-Regular.woff2') format('woff2'),
                url('fonts/iAWriterQuattroS-Regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'iA';
            src: url('fonts/iAWriterQuattroS-Bold.woff2') format('woff2'),
                url('fonts/iAWriterQuattroS-Bold.woff') format('woff');
            font-weight: bold;
            font-style: normal;
            font-display: swap;
        }

        /* ========= BASE LAYOUT ========= */

        html, body {
            @apply w-full h-full overflow-hidden;
        }

        body {
            @apply bg-[#faf8f5] font-grosa;
        }

        .page {
            @apply relative w-screen overflow-hidden;
            height: 100dvh;
        }

        .nav-links {
            @apply absolute z-10 flex items-center;
            top: 20px;
            right: 26px;
            gap: 24px;
        }

        .nav-links a {
            @apply font-ia font-medium uppercase text-[#111] no-underline;
            font-size: 10px;
            letter-spacing: 1px;
        }

        .nav-links a:hover {
            @apply opacity-60;
        }

        .pill {
            @apply absolute flex items-center whitespace-nowrap;
            height: 46px;
            border-radius: 30px;
            padding: 0 20px 0 14px;
            gap: 10px;
            border: 1px solid transparent;
            background: transparent;
        }

        .pill-icon {
            @apply shrink-0 flex items-center justify-center;
        }

        .pill-icon img {
            width: 26px;
            height: 26px;
        }

        .pill--words .pill-icon img {
            width: 30px;
            height: 30px;
        }

        .pill--ideas .pill-icon img {
            width: 22px;
            height: 22px;
        }

        .pill-text {
            @apply font-grosa text-black;
            font-size: 24px;
            line-height: 1;
        }

        .pill--writers {
            left: 21%;
            top: 25.2%;
        }

        .pill--words {
            left: 40.6%;
            top: 42.8%;
        }

        .pill--ideas {
            left: 48.4%;
            top: 11.9%;
        }

        /* ========= SIGNUP FORM ========= */

        .signup-form {
            @apply absolute flex items-center whitespace-nowrap;
            left: 60.9%;
            top: 29.8%;
            height: 58px;
            border-radius: 100px;
            padding: 5px 5px 5px 24px;
            border: 1px solid transparent;
            background: transparent;
            opacity: 0;
            transition: background 0.5s ease, border-color 0.5s ease, opacity 0.5s ease;
        }

        .signup-form input {
            @apply font-grosa bg-transparent border-0 outline-none;
            font-size: 20px;
            line-height: 1.1;
            color: #333;
            width: 190px;
        }

        .signup-form input::placeholder {
            color: #b6b6b6;
        }

        .signup-form button {
            @apply font-ia font-medium uppercase text-white cursor-pointer border-0;
            background: #994e41;
            border-radius: 30px;
            width: 113px;
            height: 48px;
            font-size: 12px;
            letter-spacing: 1.2px;
            margin-left: 12px;
            transition: background 0.2s ease;
        }

        .signup-form button:hover {
            @apply bg-black;
        }

        /* ========= MARKER LOGO ========= */

        .marker-logo {
            @apply absolute;
            left: 50%;
            bottom: -.6%;
            width: 70.8%;
        }

        .marker-logo img {
            @apply w-full h-auto block;
        }

        /* ========= ANIMATION: DEFAULT HIDDEN STATE ========= */

        .marker-logo {
            transform: translateX(-50%) translateY(100vh);
            opacity: 0;
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1),
                        opacity 0.3s ease;
        }

        .nav-links {
            opacity: 0;
            transform: translateY(-30px);
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1),
                        opacity 0.6s ease;
        }

        .pill-icon {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .pill-text {
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .pill {
            transition: background 0.5s ease, border-color 0.5s ease;
        }

        /* ========= PHASE 2: LOGO SLIDE UP ========= */

        .phase-logo .marker-logo {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .phase-logo .nav-links {
            opacity: 1;
            transform: translateY(0);
        }

        /* ========= PHASE 3: ICONS FADE IN (staggered) ========= */

        .phase-icons .pill-icon {
            opacity: 1;
        }

        .phase-icons .pill--writers .pill-icon {
            transition-delay: 0ms;
        }

        .phase-icons .pill--words .pill-icon {
            transition-delay: 150ms;
        }

        .phase-icons .pill--ideas .pill-icon {
            transition-delay: 300ms;
        }

        /* ========= PHASE 3+4: ICONS FADE IN AND FLOAT ========= */

        .phase-icons .pill--writers {
            animation: float-1 22s linear infinite;
        }

        .phase-icons .pill--words {
            animation: float-2 35s linear infinite;
        }

        .phase-icons .pill--ideas {
            animation: float-3 28s linear infinite;
        }

        /* ========= PHASE 5: PILL REVEALS (one at a time) ========= */

        .phase-pill-writers .pill--writers {
            background: #faf3f0;
            border-color: #cecece;
        }

        .phase-pill-writers .pill--writers .pill-text {
            opacity: 1;
            transition-delay: 100ms;
        }

        .phase-pill-words .pill--words {
            background: #faf3f0;
            border-color: #cecece;
        }

        .phase-pill-words .pill--words .pill-text {
            opacity: 1;
            transition-delay: 100ms;
        }

        .phase-pill-ideas .pill--ideas {
            background: #faf3f0;
            border-color: #cecece;
        }

        .phase-pill-ideas .pill--ideas .pill-text {
            opacity: 1;
            transition-delay: 100ms;
        }

        /* ========= PHASE 6: SIGNUP FORM REVEAL ========= */

        .phase-form .signup-form {
            background: white;
            border-color: #cecece;
            opacity: 1;
            animation: float-4 32s linear infinite;
        }


        /* ========= FLOATING KEYFRAMES ========= */

        /* float-1: tall narrow vertical drift, clockwise */
        @keyframes float-1 {
            0%    { transform: translate(3px, -20px); }
            12%   { transform: translate(8px, -10px); }
            25%   { transform: translate(6px, 4px); }
            37%   { transform: translate(2px, 16px); }
            50%   { transform: translate(-4px, 20px); }
            62%   { transform: translate(-9px, 10px); }
            75%   { transform: translate(-7px, -6px); }
            87%   { transform: translate(-2px, -16px); }
            100%  { transform: translate(3px, -20px); }
        }

        /* float-2: wide horizontal figure-8, counter-clockwise */
        @keyframes float-2 {
            0%    { transform: translate(-20px, 0px); }
            12%   { transform: translate(-10px, -10px); }
            25%   { transform: translate(6px, -6px); }
            37%   { transform: translate(18px, 4px); }
            50%   { transform: translate(20px, 0px); }
            62%   { transform: translate(10px, 8px); }
            75%   { transform: translate(-6px, 5px); }
            87%   { transform: translate(-18px, -4px); }
            100%  { transform: translate(-20px, 0px); }
        }

        /* float-3: diagonal drift NE-SW, tight irregular loop */
        @keyframes float-3 {
            0%    { transform: translate(10px, -12px); }
            10%   { transform: translate(16px, -6px); }
            22%   { transform: translate(12px, 6px); }
            33%   { transform: translate(2px, 14px); }
            44%   { transform: translate(-10px, 10px); }
            55%   { transform: translate(-16px, 2px); }
            66%   { transform: translate(-12px, -8px); }
            78%   { transform: translate(-4px, -16px); }
            88%   { transform: translate(6px, -14px); }
            100%  { transform: translate(10px, -12px); }
        }

        /* float-4: lazy horizontal oval, slow sway */
        @keyframes float-4 {
            0%    { transform: translate(-14px, 6px); }
            14%   { transform: translate(-6px, 12px); }
            28%   { transform: translate(8px, 10px); }
            42%   { transform: translate(16px, 2px); }
            56%   { transform: translate(14px, -6px); }
            70%   { transform: translate(4px, -12px); }
            85%   { transform: translate(-8px, -8px); }
            100%  { transform: translate(-14px, 6px); }
        }

        /* ========= MOBILE ========= */

        @media (max-width: 640px) {
            .pill--writers {
                left: 9.9%;
                top: 14%;
            }

            .pill--words {
                left: 31.6%;
                top: 31.2%;
            }

            .pill--ideas {
                left: 12.7%;
                top: 63.7%;
            }

            .signup-form {
                left: 8.7%;
                top: 44.9%;
                width: 335px;
                padding: 5px 5px 5px 20px;
            }

            .signup-form input {
                width: 0;
                flex: 1;
                min-width: 0;
            }

            .signup-form button {
                width: 99px;
                margin-left: 8px;
            }

            .marker-logo {
                width: 102%;
                bottom: -1%;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <nav class="nav-links">
            <a href="#">LEARN MORE</a>
            <a href="#">JOBS</a>
            <a href="#">LOGIN</a>
        </nav>

        <div class="pill pill--writers">
            <span class="pill-icon">
                <img src="images/icon-circle.svg" alt="">
            </span>
            <span class="pill-text">Writers first</span>
        </div>

        <div class="pill pill--words">
            <span class="pill-icon">
                <img src="images/icon-star.svg" alt="">
            </span>
            <span class="pill-text">Words matter</span>
        </div>

        <div class="pill pill--ideas">
            <span class="pill-icon">
                <img src="images/icon-grid.svg" alt="">
            </span>
            <span class="pill-text pl-1">Ideas are built together</span>
        </div>

        <form action="https://forms.userlist.com/5444a4a9-ad95-4e2a-87b2-090ce86aa9cd/submissions" method="POST" accept-charset="UTF-8" class="signup-form">
            <label for="fields_email" class="hidden">Join the waitlist</label>
            <input type="email" id="fields_email" name="fields[email]" placeholder="Join our waiting list" required autofocus>
            <button type="submit">Sign up</button>
        </form>

        <div class="marker-logo">
            <img src="images/marker-logo.svg" alt="Marker">
        </div>
    </div>

    <script>
        const page = document.querySelector('.page');

        setTimeout(() => page.classList.add('phase-logo'), 300);
        setTimeout(() => page.classList.add('phase-icons'), 1200);
        setTimeout(() => page.classList.add('phase-pill-writers'), 2600);
        setTimeout(() => page.classList.add('phase-pill-words'), 3200);
        setTimeout(() => page.classList.add('phase-pill-ideas'), 3800);
        setTimeout(() => page.classList.add('phase-form'), 4400);
    </script>
</body>

</html>
