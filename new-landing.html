<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marker - Where the rough becomes refined</title>

    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://marker.page/">
    <meta property="og:title" content="Marker - Where the rough becomes refined">
    <meta property="og:description" content="Marker is a writing space built for serious thinking: focused, flexible, and made for ideas to take shape.">
    <meta property="og:image" content="https://marker.page/images/opengraph.png">

    <!-- Twitter Card -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://marker.page/">
    <meta property="twitter:title" content="Marker - Where the rough becomes refined">
    <meta property="twitter:description" content="Marker is a writing space built for serious thinking: focused, flexible, and made for ideas to take shape.">
    <meta property="twitter:image" content="https://marker.page/images/opengraph.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'grosa': ['Grosa', 'Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        'ia': ['iA', 'Courier New', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @font-face {
            font-family: 'Grosa';
            src: url('fonts/grosa.woff2') format('woff2'),
                url('fonts/grosa.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'iA';
            src: url('fonts/iAWriterQuattroS-Regular.woff2') format('woff2'),
                url('fonts/iAWriterQuattroS-Regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'iA';
            src: url('fonts/iAWriterQuattroS-Bold.woff2') format('woff2'),
                url('fonts/iAWriterQuattroS-Bold.woff') format('woff');
            font-weight: bold;
            font-style: normal;
            font-display: swap;
        }

        /* ========= BASE LAYOUT ========= */

        html, body {
            @apply w-full h-full overflow-hidden;
        }

        body {
            @apply bg-[#fbede2] font-grosa;
        }

        .page {
            @apply relative w-screen h-screen overflow-hidden;
        }

        .nav-links {
            @apply absolute z-10 flex items-center;
            top: 20px;
            right: 26px;
            gap: 24px;
        }

        .nav-links a {
            @apply font-ia font-medium uppercase text-[#111] no-underline;
            font-size: 10px;
            letter-spacing: 1px;
        }

        .nav-links a:hover {
            @apply opacity-60;
        }

        .pill {
            @apply absolute flex items-center whitespace-nowrap;
            height: 46px;
            border-radius: 30px;
            padding: 0 20px 0 14px;
            gap: 10px;
            border: 1px solid transparent;
            background: transparent;
        }

        .pill-icon {
            @apply shrink-0 flex items-center justify-center;
        }

        .pill-icon img {
            width: 26px;
            height: 26px;
        }

        .pill--words .pill-icon img {
            width: 30px;
            height: 30px;
        }

        .pill--ideas .pill-icon img {
            width: 22px;
            height: 22px;
        }

        .pill-text {
            @apply font-grosa text-black;
            font-size: 24px;
            line-height: 1;
            transform: translateY(2px);
        }

        .pill--writers {
            left: 25.1%;
            top: 23.1%;
        }

        .pill--words {
            left: 40.6%;
            top: 40.1%;
        }

        .pill--ideas {
            left: 54.7%;
            top: 12.9%;
        }

        .marker-logo {
            @apply absolute;
            left: 50%;
            bottom: -.6%;
            width: 70.8%;
        }

        .marker-logo img {
            @apply w-full h-auto block;
        }

        /* ========= ANIMATION: DEFAULT HIDDEN STATE ========= */

        .marker-logo {
            transform: translateX(-50%) translateY(100vh);
            opacity: 0;
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1),
                        opacity 0.3s ease;
        }

        .nav-links {
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .pill-icon {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .pill-text {
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .pill {
            transition: background 0.5s ease, border-color 0.5s ease;
        }

        /* ========= PHASE 2: LOGO SLIDE UP ========= */

        .phase-logo .marker-logo {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ========= PHASE 3: ICONS FADE IN (staggered) ========= */

        .phase-icons .pill-icon {
            opacity: 1;
        }

        .phase-icons .pill--writers .pill-icon {
            transition-delay: 0ms;
        }

        .phase-icons .pill--words .pill-icon {
            transition-delay: 150ms;
        }

        .phase-icons .pill--ideas .pill-icon {
            transition-delay: 300ms;
        }

        /* ========= PHASE 3+4: ICONS FADE IN AND FLOAT ========= */
        /* Animation starts with fade-in so opacity masks the initial position */

        .phase-icons .pill--writers {
            animation: float-1 26.4s linear infinite;
        }

        .phase-icons .pill--words {
            animation: float-2 33s linear infinite;
        }

        .phase-icons .pill--ideas {
            animation: float-3 29.7s linear infinite;
        }

        /* ========= PHASE 5: PILL REVEALS (one at a time) ========= */

        .phase-pill-writers .pill--writers {
            background: white;
            border-color: #cecece;
        }

        .phase-pill-writers .pill--writers .pill-text {
            opacity: 1;
            transition-delay: 100ms;
        }

        .phase-pill-words .pill--words {
            background: white;
            border-color: #cecece;
        }

        .phase-pill-words .pill--words .pill-text {
            opacity: 1;
            transition-delay: 100ms;
        }

        .phase-pill-ideas .pill--ideas {
            background: white;
            border-color: #cecece;
        }

        .phase-pill-ideas .pill--ideas .pill-text {
            opacity: 1;
            transition-delay: 100ms;
        }

        .phase-pill-ideas .nav-links {
            opacity: 1;
        }

        /* Phase 6 (idle) — float animation continues unchanged from phase-float.
           The pill background makes the same movement feel subtler. */

        /* ========= FLOATING KEYFRAMES (Phase 4 — organic orbital paths) ========= */

        @keyframes float-1 {
            0%    { transform: translate(0px, -16px); }
            10%   { transform: translate(10px, -14px); }
            20%   { transform: translate(18px, -4px); }
            30%   { transform: translate(14px, 10px); }
            40%   { transform: translate(4px, 18px); }
            50%   { transform: translate(-8px, 14px); }
            60%   { transform: translate(-18px, 4px); }
            70%   { transform: translate(-14px, -8px); }
            80%   { transform: translate(-6px, -16px); }
            90%   { transform: translate(6px, -18px); }
            100%  { transform: translate(0px, -16px); }
        }

        @keyframes float-2 {
            0%    { transform: translate(14px, 0px); }
            10%   { transform: translate(10px, -12px); }
            20%   { transform: translate(-2px, -18px); }
            30%   { transform: translate(-14px, -12px); }
            40%   { transform: translate(-18px, 2px); }
            50%   { transform: translate(-12px, 14px); }
            60%   { transform: translate(2px, 20px); }
            70%   { transform: translate(14px, 14px); }
            80%   { transform: translate(20px, 4px); }
            90%   { transform: translate(18px, -6px); }
            100%  { transform: translate(14px, 0px); }
        }

        @keyframes float-3 {
            0%    { transform: translate(-6px, -14px); }
            8%    { transform: translate(4px, -18px); }
            16%   { transform: translate(14px, -12px); }
            25%   { transform: translate(18px, 0px); }
            33%   { transform: translate(12px, 12px); }
            42%   { transform: translate(0px, 18px); }
            50%   { transform: translate(-12px, 16px); }
            58%   { transform: translate(-18px, 6px); }
            67%   { transform: translate(-16px, -6px); }
            75%   { transform: translate(-14px, -14px); }
            83%   { transform: translate(-12px, -18px); }
            92%   { transform: translate(-8px, -16px); }
            100%  { transform: translate(-6px, -14px); }
        }


        /* ========= MOBILE ========= */

        @media (max-width: 640px) {
            .pill--writers {
                left: 10%;
                top: 22.9%;
            }

            .pill--words {
                left: 35.6%;
                top: 40.1%;
            }

            .pill--ideas {
                left: 6.4%;
                top: 57.4%;
            }

            .marker-logo {
                width: 102%;
                bottom: -1%;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <nav class="nav-links">
            <a href="#">LEARN MORE</a>
            <a href="#">JOBS</a>
            <a href="#">LOGIN</a>
        </nav>

        <div class="pill pill--writers">
            <span class="pill-icon">
                <img src="images/icon-circle.svg" alt="">
            </span>
            <span class="pill-text">Writers first</span>
        </div>

        <div class="pill pill--words">
            <span class="pill-icon">
                <img src="images/icon-star.svg" alt="">
            </span>
            <span class="pill-text">Words matter</span>
        </div>

        <div class="pill pill--ideas">
            <span class="pill-icon">
                <img src="images/icon-grid.svg" alt="">
            </span>
            <span class="pill-text">Ideas are built together</span>
        </div>

        <div class="marker-logo">
            <img src="images/marker-logo.svg" alt="Marker">
        </div>
    </div>

    <script>
        const page = document.querySelector('.page');

        setTimeout(() => page.classList.add('phase-logo'), 300);
        setTimeout(() => page.classList.add('phase-icons'), 1800);
        setTimeout(() => page.classList.add('phase-pill-writers'), 3200);
        setTimeout(() => page.classList.add('phase-pill-words'), 3800);
        setTimeout(() => page.classList.add('phase-pill-ideas'), 4400);
    </script>
</body>

</html>
