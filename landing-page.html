<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marker - Where the rough becomes refined</title>
    
    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://marker.page/">
    <meta property="og:title" content="Marker - Where the rough becomes refined">
    <meta property="og:description" content="Marker is a writing space built for serious thinking: focused, flexible, and made for ideas to take shape.">
    <meta property="og:image" content="https://marker.page/images/opengraph.png">
    
    <!-- Twitter Card -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://marker.page/">
    <meta property="twitter:title" content="Marker - Where the rough becomes refined">
    <meta property="twitter:description" content="Marker is a writing space built for serious thinking: focused, flexible, and made for ideas to take shape.">
    <meta property="twitter:image" content="https://marker.page/images/opengraph.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'page-bg': '#faf3f0',
                        'heading': '#334155',
                    },
                    fontFamily: {
                        'museum': ['PP Museum', 'Georgia', 'Times New Roman', 'serif'],
                        'grosa': ['Grosa', 'Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @font-face {
            font-family: 'PP Museum';
            src: url('fonts/museum-light.woff2') format('woff2'),
                url('fonts/museum-light.woff') format('woff');
            font-weight: 300;
            font-style: normal;
            font-display: swap;
        }

        html, body {
            background: #faf3f0 !important;
        }
    </style>
</head>

<body class="min-h-screen">

    <!-- Logo -->
    <div id="logo" class="fixed top-4 left-5 z-50">
        <img src="images/pebbles-together.png" alt="Marker" class="h-6 w-auto">
    </div>

    <!-- Section 1: Intro -->
    <section id="section1" class="h-screen flex items-center justify-center px-6">
        <h1 id="heading" class="font-museum font-light text-heading text-center tracking-[-0.02em] leading-[1.12] max-w-[1127px] text-[clamp(40px,8vw,114px)]">
            In 1975, a man invented an Electric Pencil.
        </h1>
    </section>

    <!-- Section 2: Electric Pencil + both paragraphs -->
    <section id="section2" class="px-6 pt-8 pb-[30vh]">
        <div class="w-full max-w-[763px] mx-auto flex flex-col items-center text-center">
            <img id="epSvg" src="images/electricpencil-plain.svg" alt="Michael Shrayer's Electric Pencil" class="w-full max-w-[550px] mb-16">
            <p class="body-text font-grosa text-[clamp(22px,2.5vw,34px)] leading-[1.3] max-w-[547px] mb-10">
                It was the first word processor that if we travelled back in time we would recognise as such.
            </p>
            <p id="lastParagraph" class="body-text font-grosa text-[clamp(22px,2.5vw,34px)] leading-[1.3] max-w-[547px]">
                We are 50 years later now. And the things Michael made back then – from word wrap to search and replace – somehow still constitute the state of the art.
            </p>
        </div>
    </section>

    <!-- Section 3: Future content on cream -->
    <section id="section3" class="min-h-screen px-6 py-24">
    </section>

    <script>
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
        window.scrollTo(0, 0);

        const logo = document.getElementById('logo');
        const heading = document.getElementById('heading');
        const section2 = document.getElementById('section2');
        const section3 = document.getElementById('section3');
        const lastParagraph = document.getElementById('lastParagraph');
        const epSvg = document.getElementById('epSvg');
        const bodyTexts = document.querySelectorAll('.body-text');

        const cream = { r: 250, g: 243, b: 240 };
        const darkText = { r: 51, g: 65, b: 85 };

        function clamp(v) { return Math.max(0, Math.min(1, v)); }

        function updateScroll() {
            const scrollY = window.scrollY;
            const vh = window.innerHeight;

            // Parallax: pull section 2 upward as you scroll
            const pullAmount = Math.min(scrollY * 0.4, vh * 0.35);
            section2.style.transform = `translateY(-${pullAmount}px)`;

            // SVG bottom position accounting for parallax — revert starts when SVG scrolls off top
            const svgBottom = epSvg.offsetTop + epSvg.offsetHeight - pullAmount;

            let darkness = 0;

            // Fade to dark: cream → dark gray over first 20% of vh, then gradually to black
            const snapEnd = vh * 0.2;
            const deepenEnd = vh * 0.6;
            // Revert to cream: begins when SVG top exits viewport, fades over a full vh
            const revertStart = svgBottom;
            const revertEnd = revertStart + vh;

            if (scrollY <= 0) {
                darkness = 0;
            } else if (scrollY <= snapEnd) {
                const t = scrollY / snapEnd;
                darkness = 0.85 * (1 - Math.pow(1 - t, 2));
            } else if (scrollY <= deepenEnd) {
                const t = (scrollY - snapEnd) / (deepenEnd - snapEnd);
                darkness = 0.85 + 0.15 * t;
            } else if (scrollY <= revertStart) {
                darkness = 1;
            } else if (scrollY <= revertEnd) {
                const t = (scrollY - revertStart) / (revertEnd - revertStart);
                // Mirror the fade-in: quick snap to light (first 20%), then gradual to cream
                if (t <= 0.2) {
                    darkness = 1 - (t / 0.2) * 0.85;
                } else {
                    darkness = 0.15 * (1 - (t - 0.2) / 0.8);
                }
            } else {
                darkness = 0;
            }

            darkness = clamp(darkness);

            const bgR = Math.round(cream.r * (1 - darkness));
            const bgG = Math.round(cream.g * (1 - darkness));
            const bgB = Math.round(cream.b * (1 - darkness));
            document.body.style.setProperty('background', `rgb(${bgR},${bgG},${bgB})`, 'important');

            const textProgress = clamp(darkness * 2);
            const tR = Math.round(darkText.r + (255 - darkText.r) * textProgress);
            const tG = Math.round(darkText.g + (255 - darkText.g) * textProgress);
            const tB = Math.round(darkText.b + (255 - darkText.b) * textProgress);
            const textColor = `rgb(${tR},${tG},${tB})`;

            heading.style.color = textColor;
            bodyTexts.forEach(el => { el.style.color = textColor; });

            logo.style.opacity = clamp(1 - darkness * 3);
        }

        window.addEventListener('scroll', updateScroll, { passive: true });
        window.addEventListener('load', () => { window.scrollTo(0, 0); updateScroll(); });
        updateScroll();
    </script>
</body>

</html>
